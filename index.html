<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Photography Portfolio - History Vibe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* General styles */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            color: #FFFFFF;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(90deg, #000, #34C759);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.3);
        }

        header nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
        }

        header nav ul li a {
            color: #FFFFFF;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        header nav ul li a:hover {
            color: #34C759;
            text-shadow: 0 0 10px #34C759;
        }

        .logo {
            position: absolute;
            top: 10px;
            left: 20px;
            z-index: 1001;
        }

        .logo img {
            width: 70px;
            height: auto;
            border-radius: 50%;
        }

        section {
            text-align: center;
            padding: 50px 20px;
        }
        .hero {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://via.placeholder.com/1920x1080?text=Photography');
            background-size: cover;
            background-position: center;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #FFFFFF;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #34C759;
            text-shadow: 0 0 20px rgba(52, 199, 89, 0.5);
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #FFFFFF;
        }

        .hero button {
            padding: 15px 40px;
            background: #34C759;
            border: none;
            color: #000;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(52, 199, 89, 0.4);
        }

        .hero button:hover {
            background: #FFFFFF;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: #34C759;
            text-shadow: 0 0 15px rgba(52, 199, 89, 0.3);
        }

        h3 {
            color: #34C759;
        }

        /* About Section */
        #about {
            background: linear-gradient(135deg, #000, #1a1a1a);
            color: #FFFFFF;
        }

        .ceo {
            margin: 30px auto;
            padding: 30px;
            background: rgba(52, 199, 89, 0.1);
            border-radius: 15px;
            border: 2px solid #34C759;
            max-width: 600px;
        }

        .ceo img {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 3px solid #34C759;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .ceo img:hover {
            transform: scale(1.05);
        }

        .ceo p {
            margin: 10px 0;
            font-size: 1.1rem;
        }

        /* Portfolio Gallery Section */
        #samples {
            background: linear-gradient(135deg, #000, #1a1a1a);
            color: #FFFFFF;
        }

        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(52, 199, 89, 0.2);
            border: 2px solid #34C759;
            color: #FFFFFF;
            cursor: pointer;
            border-radius: 25px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #34C759;
            color: #000;
            transform: scale(1.05);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
            padding: 0 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            cursor: pointer;
            background: #000;
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.2);
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(52, 199, 89, 0.5);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.15) rotate(2deg);
        }

        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .gallery-overlay {
            transform: translateY(0);
        }

        .gallery-overlay p {
            color: #34C759;
            font-weight: bold;
            margin: 5px 0;
        }

        /* Lightbox Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            margin: auto;
            display: block;
            width: 90%;
            max-width: 900px;
            margin-top: 50px;
            border-radius: 10px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close-modal {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-modal:hover {
            color: #34C759;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            transform: translateY(-50%);
        }

        .modal-nav button {
            background: rgba(52, 199, 89, 0.7);
            border: none;
            color: #fff;
            font-size: 30px;
            padding: 15px 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .modal-nav button:hover {
            background: #34C759;
        }

        .modal-caption {
            text-align: center;
            color: #34C759;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Video Section */
        #videos {
            background: linear-gradient(135deg, #000, #1a1a1a);
        }

        .video-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 30px;
        }

        video {
            width: 100%;
            max-width: 400px;
            height: auto;
            border: 3px solid #34C759;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.3);
            transition: transform 0.3s ease;
        }

        video:hover {
            transform: scale(1.05);
        }
 /* Contact Section */
        #contact {
            background: linear-gradient(135deg, #000, #1a1a1a);
        }

        .contact-form {
            max-width: 600px;
            margin: 30px auto;
            background: rgba(52, 199, 89, 0.1);
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #34C759;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #34C759;
            color: #FFFFFF;
            border-radius: 5px;
            font-size: 1rem;
        }

        .contact-form input::placeholder,
        .contact-form textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            background: rgba(52, 199, 89, 0.2);
            box-shadow: 0 0 10px rgba(52, 199, 89, 0.5);
        }

        .contact-form button {
            width: 100%;
            padding: 12px;
            background: #34C759;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .contact-form button:hover {
            background: #FFFFFF;
            transform: scale(1.02);
        }

        /* Footer */
        footer {
            background: #34C759;
            padding: 30px;
            text-align: center;
            color: #000;
            font-weight: bold;
        }

        footer ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        footer ul li a {
            color: #000;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        footer ul li a:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
